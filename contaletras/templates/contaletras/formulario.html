<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contador de Letras</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container-box {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .resultado-central {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(0,0,0,0.6);
            color: white;
        }

        .numero {
            font-size: 120px;
            font-weight: bold;
        }

        .texto {
            font-size: 22px;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h2 class="text-center mb-4">📝 Contador de Letras</h2>

    <form method="POST">
        {% csrf_token %}

        <textarea 
            name="texto" 
            class="form-control mb-3" 
            rows="5" 
            placeholder="Digite aqui...">{{ texto }}</textarea>

        <div class="d-grid">
            <button class="btn btn-primary">Calcular</button>
        </div>
    </form>
</div>

<!-- Resultado aparece por cima (overlay) -->
{% if resultado %}
<div class="resultado-central">
    <div class="texto">Quantidade de letras</div>
    <div class="numero">{{ resultado }}</div>

    <a href="" class="btn btn-light mt-4">Voltar</a>
</div>
{% endif %}

</body>
</html>
