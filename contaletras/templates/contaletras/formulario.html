<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contador de Letras</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #715dca, #a960d3);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container-box {
            max-width: 600px;
            margin: 50px auto;
            background: rgb(221, 167, 105);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }


/* Estilo geral do botão */
.btn-primary {
    background: #be9351;
    border: none; /* Remove a borda padrão do bootstrap */
    border-radius: 10px; /* Altere este valor para mudar os cantos (ex: 50px para redondo) */
    transition: all 0.2s; /* Deixa a mudança de formato suave */
}

/* Quando passa o mouse */
.btn-primary:hover {
    background: #a67c3d; /* Um tom um pouco mais escuro */
    border-radius: 20px; /* Opcional: os cantos mudam ao passar o mouse */
}

/* Quando você aperta e SEGURA */
.btn-primary:active {
    background-color: rgb(150, 96, 16) !important; /* Cor que você pediu */
    border-radius: 50px !important; /* Os cantos ficam bem redondos ao segurar */
    transform: scale(0.95); /* Opcional: dá um efeito de "afundar" o botão */
}
        .resultado-central {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(199, 154, 230, 0.767);
            color: rgb(255, 255, 255);
        }

        .numero {
            font-size: 120px;
            font-weight: bold;
        }

        .texto {
            font-size: 22px;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h2 class="text-center mb-4">📝 Contador de Letras</h2>

    <form method="POST">
        {% csrf_token %}

        <textarea 
            name="texto" 
            class="form-control mb-3" 
            rows="5" 
            placeholder="Digite aqui...">{{ texto }}</textarea>

        <div class="d-grid">
            <button class="btn btn-primary" id = "botao">Calcular</button>
        </div>
    </form>
</div>

<!-- Resultado aparece por cima (overlay) -->
{% if resultado %}
<div class="resultado-central">
    <div class="texto">Quantidade de letras</div>
    <div class="numero">{{ resultado }}</div>

    <a href="" class="btn btn-light mt-4">Voltar</a>
</div>
{% endif %}

</body>
</html>
